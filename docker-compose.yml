services:
  mysql:
    image: mysql:8.0
    container_name: temcar-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: temcar
      MYSQL_USER: temcar
      MYSQL_PASSWORD: temcar
      MYSQL_ROOT_PASSWORD: root
      TZ: America/Sao_Paulo
    ports:
      - "3307:3306"
    volumes:
      - temcar_mysql_data:/var/lib/mysql
      - ./temcar.sql:/docker-entrypoint-initdb.d/01-temcar.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

volumes:
  temcar_mysql_data:
